<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="accent-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    
    <linearGradient id="accent-amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      @keyframes rotate-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes dash {
        to { stroke-dashoffset: -40; }
      }
      .floating-node {
        animation: float 6s ease-in-out infinite;
      }
      .floating-node-delayed {
        animation: float 6s ease-in-out infinite;
        animation-delay: 3s;
      }
      .pulse-glow {
        animation: pulse 3s ease-in-out infinite;
      }
      .network-line {
        stroke-dasharray: 8, 4;
        animation: dash 5s linear infinite;
      }
      .title-text {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 800;
        fill: #f8fafc;
        font-size: 42px;
        letter-spacing: -0.05em;
      }
      .subtitle-text {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 500;
        fill: #94a3b8;
        font-size: 18px;
        letter-spacing: 0.1em;
      }
      .badge-text {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 600;
        fill: #38bdf8;
        font-size: 13px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="16" fill="url(#bg-grad)" />
  <rect width="898" height="318" x="1" y="1" rx="15" fill="none" stroke="#334155" stroke-width="2" />

  <!-- Ambient Light Orbs -->
  <circle cx="800" cy="80" r="120" fill="#6366f1" opacity="0.12" filter="url(#glow)" />
  <circle cx="100" cy="240" r="100" fill="#f59e0b" opacity="0.08" filter="url(#glow)" />

  <!-- Interactive Grid Background -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M 0 40 L 900 40 M 0 80 L 900 80 M 0 120 L 900 120 M 0 160 L 900 160 M 0 200 L 900 200 M 0 240 L 900 240 M 0 280 L 900 280" />
    <path d="M 100 0 L 100 320 M 200 0 L 200 320 M 300 0 L 300 320 M 400 0 L 400 320 M 500 0 L 500 320 M 600 0 L 600 320 M 700 0 L 700 320 M 800 0 L 800 320" />
  </g>

  <!-- Graphic Elements: Data Science & AI Network (Right Side) -->
  <g transform="translate(620, 160)">
    <!-- Connections -->
    <line x1="-120" y1="-50" x2="-40" y2="40" stroke="#475569" stroke-width="1.5" />
    <line x1="-120" y1="-50" x2="40" y2="-60" stroke="#475569" stroke-width="1.5" />
    <line x1="-40" y1="40" x2="40" y2="-60" stroke="#475569" stroke-width="1.5" />
    <line x1="40" y1="-60" x2="120" y2="-20" stroke="#475569" stroke-width="1.5" />
    <line x1="-40" y1="40" x2="80" y2="70" stroke="#475569" stroke-width="1.5" />
    <line x1="120" y1="-20" x2="80" y2="70" stroke="#475569" stroke-width="1.5" />

    <!-- Animated Data/Flow line -->
    <path d="M -120 -50 Q -40 40 80 70" fill="none" stroke="url(#accent-blue)" stroke-width="2.5" class="network-line" />
    <path d="M 40 -60 Q 120 -20 80 70" fill="none" stroke="url(#accent-amber)" stroke-width="2.5" class="network-line" style="animation-delay: 2.5s;" />

    <!-- Nodes -->
    <!-- DevOps/Inf Node -->
    <g class="floating-node" transform="translate(-120, -50)">
      <circle r="22" fill="#1e293b" stroke="#6366f1" stroke-width="2" />
      <path d="M-8-4 C-4-8 4-8 8-4 C12 0 12 8 8 4 C4 0 -4 0 -8 -4 Z" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.8"/>
      <circle r="4" fill="#38bdf8" />
    </g>

    <!-- Data Science Node -->
    <g class="floating-node-delayed" transform="translate(-40, 40)">
      <circle r="26" fill="#1e293b" stroke="#f59e0b" stroke-width="2" />
      <!-- Small bar chart representation -->
      <rect x="-8" y="-10" width="4" height="20" rx="1" fill="#f59e0b" />
      <rect x="-2" y="-15" width="4" height="25" rx="1" fill="#f59e0b" opacity="0.8" />
      <rect x="4" y="-5" width="4" height="15" rx="1" fill="#f59e0b" opacity="0.6" />
    </g>

    <!-- AI/ML Node (Central Brain) -->
    <g class="floating-node" transform="translate(40, -60)">
      <circle r="30" fill="#1e293b" stroke="url(#accent-blue)" stroke-width="2.5" filter="url(#glow)"/>
      <path d="M-10-8 A10 10 0 1 1 10 -8 A10 10 0 1 1 -10 -8" fill="none" stroke="#6366f1" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#38bdf8" class="pulse-glow" />
    </g>

    <!-- Model Deployment Node -->
    <g class="floating-node-delayed" transform="translate(120, -20)">
      <circle r="20" fill="#1e293b" stroke="#10b981" stroke-width="2" />
      <polygon points="0,-8 7,5 -7,5" fill="none" stroke="#10b981" stroke-width="1.5" />
    </g>

    <!-- Output/Insight Node -->
    <g class="floating-node" transform="translate(80, 70)">
      <circle r="24" fill="#1e293b" stroke="#e11d48" stroke-width="2" />
      <!-- Star/Insight shape -->
      <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#e11d48" />
    </g>
  </g>

  <!-- Left Side: Professional Headline -->
  <g transform="translate(60, 95)">
    <!-- Subtitle/Specialization -->
    <text class="subtitle-text" x="0" y="0">COMPUTER SCIENCE &amp; ENGINEERING</text>
    
    <!-- Main Name -->
    <text class="title-text" x="0" y="45">Aditya Prakash</text>

    <!-- Accent Line -->
    <line x1="0" y1="65" x2="300" y2="65" stroke="url(#accent-blue)" stroke-width="4" stroke-linecap="round" />

    <!-- Current learning domains badges -->
    <g transform="translate(0, 95)">
      <!-- DevOps -->
      <rect x="0" y="0" width="75" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1" />
      <text class="badge-text" x="15" y="17" fill="#38bdf8">DevOps</text>

      <!-- AI/ML -->
      <rect x="85" y="0" width="70" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1" />
      <text class="badge-text" x="101" y="17" fill="#6366f1">AI/ML</text>

      <!-- Data Science -->
      <rect x="165" y="0" width="110" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1" />
      <text class="badge-text" x="178" y="17" fill="#f59e0b">Data Science</text>
    </g>
  </g>
</svg>
